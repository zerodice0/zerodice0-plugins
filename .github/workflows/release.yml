name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate plugin structure
        run: |
          echo "Validating release structure..."
          test -f .claude-plugin/marketplace.json
          cat .claude-plugin/marketplace.json | python3 -m json.tool > /dev/null
          echo "✓ marketplace.json is valid JSON"

          for plugin_json in plugins/*/.claude-plugin/plugin.json; do
            if [ -f "$plugin_json" ]; then
              plugin_dir=$(dirname "$(dirname "$plugin_json")")
              plugin_name=$(basename "$plugin_dir")
              cat "$plugin_json" | python3 -m json.tool > /dev/null
              echo "✓ $plugin_name/plugin.json is valid JSON"
            fi
          done

      - name: Extract version from tag
        id: version
        env:
          GH_REF: ${{ github.ref }}
        run: echo "VERSION=${GH_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          if [ -f CHANGELOG.md ]; then
            sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | head -n -1 >> release_notes.md || true
          fi

          echo "" >> release_notes.md
          echo "## Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "/plugin marketplace add zerodice0/zerodice0-plugins" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "Available plugins:" >> release_notes.md
          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            echo "- \`/plugin install ${plugin_name}@zerodice0-plugins\`" >> release_notes.md
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
